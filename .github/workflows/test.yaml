jobs:
  status-check:
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./
